<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FS Admin - Filiais & Vendedores</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>.grad{background: linear-gradient(135deg,#0ea5e9,#7c3aed);}</style>
</head>
<body class="min-h-screen bg-slate-100">
  <header class="grad text-white">
    <div class="max-w-5xl mx-auto px-4 py-10">
      <h1 class="text-3xl font-extrabold tracking-tight">Admin local</h1>
      <p class="opacity-90 mt-2">Gera/edita o <code>fs_auth.json</code> e cria links para enviar aos vendedores.</p>
      <p class="opacity-90 mt-1 text-sm">Use aqui no seu PC. Depois, faça upload do <code>fs_auth.json</code> no GitHub (mesma pasta do site).</p>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 -mt-8 pb-14 space-y-6">
    <section class="bg-white rounded-2xl shadow p-5 border">
      <div class="flex flex-col md:flex-row md:items-end gap-4">
        <div class="flex-1">
          <label class="text-sm font-semibold text-slate-700">Carregar fs_auth.json existente</label>
          <input id="fileIn" type="file" accept="application/json" class="mt-2 block w-full">
        </div>
        <div class="flex-1">
          <label class="text-sm font-semibold text-slate-700">Arquivo do app (para redirecionar)</label>
          <input id="appUrl" class="mt-2 w-full rounded-xl border px-3 py-3" placeholder="index.html">
        </div>
        <button id="btnDownload" class="rounded-xl bg-indigo-600 text-white px-4 py-3 font-bold hover:bg-indigo-700">
          Baixar fs_auth.json
        </button>
      </div>
      <div id="msg" class="mt-3 text-sm text-slate-600"></div>
    </section>

    <section class="bg-white rounded-2xl shadow p-5 border">
      <h2 class="text-lg font-bold text-slate-800">Adicionar / editar filial</h2>
      <div class="grid md:grid-cols-3 gap-4 mt-4">
        <div>
          <label class="text-sm font-semibold text-slate-700">Filial ID</label>
          <input id="filialId" class="mt-2 w-full rounded-xl border px-3 py-3" placeholder="28">
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-700">Nome da filial</label>
          <input id="filialNome" class="mt-2 w-full rounded-xl border px-3 py-3" placeholder="Iguatu III">
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-700">Status</label>
          <select id="filialStatus" class="mt-2 w-full rounded-xl border px-3 py-3">
            <option>ATIVA</option>
            <option>INATIVA</option>
          </select>
        </div>
      </div>

      <div class="mt-4">
        <label class="text-sm font-semibold text-slate-700">Vendedores (um por linha)</label>
        <textarea id="vendedores" class="mt-2 w-full rounded-xl border px-3 py-3 h-36"
          placeholder="Flávio&#10;Larissa&#10;Patrícia"></textarea>
        <p class="text-xs text-slate-500 mt-2">Ao salvar, cada vendedor recebe uma <b>Key</b> automática para o link de ativação.</p>
      </div>

      <div class="flex flex-col md:flex-row gap-3 mt-4">
        <button id="btnSalvarFilial" class="rounded-xl bg-emerald-600 text-white px-4 py-3 font-bold hover:bg-emerald-700">
          Salvar filial + vendedores
        </button>
        <button id="btnListar" class="rounded-xl border px-4 py-3 font-semibold bg-white hover:bg-slate-50">
          Atualizar lista/links
        </button>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow p-5 border">
      <h2 class="text-lg font-bold text-slate-800">Filiais cadastradas</h2>
      <div id="list" class="mt-4 space-y-4"></div>
    </section>
  </main>

<script>
const DEFAULT = {
  version: 1,
  updatedAt: "",
  appUrl: "index.html",
  filiais: {}
};

let AUTH = structuredClone(DEFAULT);

const $ = (id)=>document.getElementById(id);
const strip = (s)=> (s||"").toString().trim();
const norm = (s)=>{
  s = strip(s).toLowerCase();
  try{ s = s.normalize("NFD").replace(/[\u0300-\u036f]/g,""); }catch(e){}
  s = s.replace(/\s+/g," ").trim();
  return s;
};
function key(n=6){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // evita confusão I/1/O/0
  let out="";
  for(let i=0;i<n;i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}
function msg(t){ $("msg").textContent = t; }

function render(){
  const list = $("list");
  list.innerHTML = "";
  const filiais = AUTH.filiais || {};
  const ids = Object.keys(filiais).sort((a,b)=>Number(a)-Number(b));
  if(ids.length===0){
    list.innerHTML = '<div class="text-sm text-slate-500">Nenhuma filial cadastrada ainda.</div>';
    return;
  }
  ids.forEach(id=>{
    const f = filiais[id];
    const wrap = document.createElement("div");
    wrap.className = "rounded-xl border p-4 bg-slate-50";
    const vend = f.vendedores || {};
    const vendKeys = Object.keys(vend).sort();
    const base = location.origin && location.origin.startsWith("http") ? location.origin + location.pathname.replace(/\/[^\/]*$/,'/') : "";
    const accessPath = "fs_access.html";
    const links = vendKeys.map(vk=>{
      const v = vend[vk];
      const u = new URL((base? base : "") + accessPath, "http://local/");
      u.searchParams.set("filial", id);
      u.searchParams.set("user", vk);
      u.searchParams.set("key", v.key || "");
      const href = base ? u.toString().replace("http://local/","") : (accessPath + "?filial="+encodeURIComponent(id)+"&user="+encodeURIComponent(vk)+"&key="+encodeURIComponent(v.key||""));
      return `<div class="mt-2">
        <div class="text-sm font-semibold">${v.nome} <span class="text-xs font-normal text-slate-500">(${v.status||"ATIVO"})</span></div>
        <div class="text-xs break-all text-slate-600">${href}</div>
      </div>`;
    }).join("");

    wrap.innerHTML = `
      <div class="flex items-start justify-between gap-4">
        <div>
          <div class="text-base font-bold text-slate-800">Filial ${id} — ${f.nome||""}</div>
          <div class="text-xs text-slate-600">Status: <b>${(f.status||"ATIVA")}</b> • Vendedores: <b>${vendKeys.length}</b></div>
        </div>
        <div class="flex gap-2">
          <button class="btnEdit rounded-lg border bg-white px-3 py-2 text-sm font-semibold hover:bg-slate-50" data-id="${id}">Editar</button>
          <button class="btnDelete rounded-lg border bg-white px-3 py-2 text-sm font-semibold hover:bg-rose-50" data-id="${id}">Excluir</button>
        </div>
      </div>
      <div class="mt-3 text-sm text-slate-700">
        <div class="font-semibold">Links de ativação (envie para cada vendedor):</div>
        ${links || '<div class="text-xs text-slate-500 mt-2">Sem vendedores cadastrados.</div>'}
      </div>
    `;
    list.appendChild(wrap);
  });

  list.querySelectorAll(".btnEdit").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = btn.dataset.id;
      const f = AUTH.filiais[id];
      $("filialId").value = id;
      $("filialNome").value = f.nome||"";
      $("filialStatus").value = (f.status||"ATIVA");
      const vend = f.vendedores||{};
      const lines = Object.keys(vend).sort().map(k=>vend[k].nome||k).join("\n");
      $("vendedores").value = lines;
      window.scrollTo({top:0, behavior:"smooth"});
      msg("Editando filial " + id + ".");
    });
  });

  list.querySelectorAll(".btnDelete").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = btn.dataset.id;
      if(confirm("Excluir a filial " + id + " e todos os vendedores?")){
        delete AUTH.filiais[id];
        AUTH.updatedAt = new Date().toISOString();
        render();
      }
    });
  });
}

function saveFilial(){
  const id = strip($("filialId").value);
  const nome = strip($("filialNome").value);
  const status = strip($("filialStatus").value) || "ATIVA";
  if(!id) return msg("Informe o ID da filial.");
  if(!nome) return msg("Informe o nome da filial.");

  AUTH.appUrl = strip($("appUrl").value) || AUTH.appUrl || "index.html";
  AUTH.filiais[id] = AUTH.filiais[id] || { nome, status, vendedores:{} };
  AUTH.filiais[id].nome = nome;
  AUTH.filiais[id].status = status;

  const rawLines = $("vendedores").value.split("\n").map(l=>strip(l)).filter(Boolean);
  const vendedores = {};
  rawLines.forEach(n=>{
    const k = norm(n);
    if(!k) return;
    const prev = (AUTH.filiais[id].vendedores||{})[k];
    vendedores[k] = {
      nome: n,
      status: (prev && prev.status) ? prev.status : "ATIVO",
      key: (prev && prev.key) ? prev.key : key()
    };
  });
  AUTH.filiais[id].vendedores = vendedores;
  AUTH.updatedAt = new Date().toISOString();
  msg("Filial salva. Links atualizados.");
  render();
}

function download(){
  AUTH.appUrl = strip($("appUrl").value) || AUTH.appUrl || "index.html";
  AUTH.updatedAt = new Date().toISOString();
  const blob = new Blob([JSON.stringify(AUTH, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fs_auth.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  msg("Baixado fs_auth.json. Agora faça upload desse arquivo no GitHub (mesma pasta do site).");
}

$("btnSalvarFilial").addEventListener("click", saveFilial);
$("btnListar").addEventListener("click", render);
$("btnDownload").addEventListener("click", download);

$("fileIn").addEventListener("change", async (ev)=>{
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  try{
    const txt = await file.text();
    const j = JSON.parse(txt);
    AUTH = Object.assign(structuredClone(DEFAULT), j);
    $("appUrl").value = AUTH.appUrl || "index.html";
    msg("Carregado. Você pode editar e baixar novamente.");
    render();
  }catch(e){
    msg("Falha ao carregar JSON: " + e.message);
  }
});

(function init(){
  $("appUrl").value = AUTH.appUrl;
  msg("Dica: gere o fs_auth.json aqui e suba no GitHub junto com fs_access.html.");
  render();
})();
</script>
</body>
</html>
