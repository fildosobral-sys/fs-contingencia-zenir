<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FS • Acesso</title>
<style>
  :root{
    --bg1:#0f172a;
    --bg2:#1e293b;
    --card:#ffffff;
    --text:#111827;
    --accent1:#5b7cf5;
    --accent2:#6f57ea;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  .container{
    width:100%;
    max-width:420px;
    padding:20px;
  }
  .title{
    text-align:center;
    font-size:20px;
    font-weight:700;
    margin-bottom:12px;
    opacity:.96;
  }
  .subtitle{
    text-align:center;
    font-size:14px;
    color:rgba(255,255,255,.72);
    margin-bottom:24px;
  }
  .card{
    background:var(--card);
    color:var(--text);
    border-radius:22px;
    padding:20px;
    margin-bottom:15px;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 15px 40px rgba(0,0,0,.20);
    transition:transform .2s ease;
  }
  .card:active{ transform:scale(.985); }
  .left{
    display:flex;
    align-items:center;
    gap:15px;
  }
  .icon{
    width:50px;
    height:50px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    background:linear-gradient(135deg,var(--accent1),var(--accent2));
    color:#fff;
  }
  .name{
    font-size:16px;
    font-weight:700;
  }
  .arrow{
    font-size:18px;
    opacity:.45;
  }
  .hint{
    margin-top:10px;
    text-align:center;
    font-size:12px;
    color:rgba(255,255,255,.52);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="title">Escolher versão</div>
    <div class="subtitle">Selecione manualmente a plataforma desejada.</div>

    <a href="index-mobile.html" class="card">
      <div class="left">
        <div class="icon">📱</div>
        <div class="name">Mobile</div>
      </div>
      <div class="arrow">→</div>
    </a>

    <a href="index-desktop.html" class="card">
      <div class="left">
        <div class="icon">🖥️</div>
        <div class="name">Desktop</div>
      </div>
      <div class="arrow">→</div>
    </a>

    <div class="hint">A seleção fica manual para evitar redirecionamentos errados.</div>
  </div>
</body>
</html>
