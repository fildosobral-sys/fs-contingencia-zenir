<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS • Acesso</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(160deg,#0f172a,#1e293b);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:420px;
  padding:20px;
}

.title{
  text-align:center;
  font-size:22px;
  font-weight:600;
  margin-bottom:25px;
  opacity:.9;
}

.card{
  background:#fff;
  color:#111;
  border-radius:22px;
  padding:20px;
  margin-bottom:15px;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 15px 40px rgba(0,0,0,.2);
  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.left{
  display:flex;
  align-items:center;
  gap:15px;
}

.icon{
  width:50px;
  height:50px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  background:linear-gradient(135deg,#5b7cf5,#6f57ea);
  color:#fff;
}

.name{
  font-size:16px;
  font-weight:600;
}

.arrow{
  font-size:18px;
  opacity:.5;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">Selecionar acesso</div>

  <a href="index-mobile.html" class="card">
    <div class="left">
      <div class="icon">📱</div>
      <div class="name">Mobile</div>
    </div>
    <div class="arrow">→</div>
  </a>

  <a href="index.html" class="card">
    <div class="left">
      <div class="icon">🖥️</div>
      <div class="name">Desktop</div>
    </div>
    <div class="arrow">→</div>
  </a>
</div>

</body>
</html>
