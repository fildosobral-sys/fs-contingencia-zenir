<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>FS • Escolha da Plataforma</title>
<style>
:root{
  --bg1:#040814;
  --bg2:#0b1d48;
  --bg3:#1d41a3;
  --stroke:rgba(255,255,255,.16);
  --text:#fff;
  --muted:rgba(255,255,255,.72);
  --shadow:0 30px 80px rgba(0,0,0,.42);
  --shadow-soft:0 18px 40px rgba(0,0,0,.22);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 15%, rgba(124,101,255,.26), transparent 22%),
    radial-gradient(circle at 78% 18%, rgba(91,155,255,.22), transparent 20%),
    radial-gradient(circle at 50% 82%, rgba(68,115,255,.16), transparent 24%),
    linear-gradient(160deg,var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
  background-size:140% 140%;
  animation:bgMove 16s ease-in-out infinite alternate;
  -webkit-font-smoothing:antialiased;
}
@keyframes bgMove{
  0%{background-position:0% 50%}
  100%{background-position:100% 50%}
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(115deg, transparent 0 43%, rgba(255,255,255,.035) 50%, transparent 57%),
    linear-gradient(180deg, rgba(255,255,255,.03), transparent 18%);
  pointer-events:none;
}
.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
}
.particles span{
  position:absolute;
  width:6px;height:6px;
  border-radius:50%;
  background:rgba(255,255,255,.55);
  box-shadow:0 0 12px rgba(255,255,255,.45);
  animation:floatParticle linear infinite;
}
.particles span:nth-child(1){left:12%;top:74%;animation-duration:12s;animation-delay:-2s;opacity:.45}
.particles span:nth-child(2){left:28%;top:18%;animation-duration:16s;animation-delay:-4s;opacity:.35}
.particles span:nth-child(3){left:82%;top:26%;animation-duration:14s;animation-delay:-7s;opacity:.3}
.particles span:nth-child(4){left:66%;top:80%;animation-duration:18s;animation-delay:-6s;opacity:.25}
.particles span:nth-child(5){left:90%;top:60%;animation-duration:11s;animation-delay:-1s;opacity:.38}
.particles span:nth-child(6){left:8%;top:34%;animation-duration:13s;animation-delay:-3s;opacity:.28}
@keyframes floatParticle{
  0%{transform:translateY(0) scale(.7)}
  50%{transform:translateY(-24px) scale(1)}
  100%{transform:translateY(-48px) scale(.6)}
}
.orb{
  position:fixed;
  width:280px;height:280px;
  left:-70px;top:90px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(90,124,255,.24), transparent 60%);
  filter:blur(56px);
  animation:orbFloat 10s ease-in-out infinite;
  pointer-events:none;
}
.orb::after{
  content:"";
  position:absolute;
  width:220px;height:220px;
  right:-250px;top:260px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(141,102,255,.22), transparent 60%);
  filter:blur(40px);
  animation:orbFloat2 12s ease-in-out infinite;
}
@keyframes orbFloat{50%{transform:translate(28px,-14px) scale(1.08)}}
@keyframes orbFloat2{50%{transform:translate(-18px,16px) scale(.95)}}

.wrap{
  width:min(100%, 430px);
  padding:18px;
  position:relative;
  z-index:2;
  animation:wrapIn .95s cubic-bezier(.2,.8,.2,1);
}
@keyframes wrapIn{
  from{opacity:0;transform:translateY(34px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.hero{
  position:relative;
  overflow:hidden;
  border-radius:36px;
  padding:28px 22px 22px;
  background:
    linear-gradient(145deg, rgba(255,255,255,.13), rgba(255,255,255,.05));
  border:1px solid rgba(255,255,255,.16);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px) saturate(1.15);
  -webkit-backdrop-filter:blur(18px) saturate(1.15);
  margin-bottom:18px;
}
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 18% 18%, rgba(124,101,255,.14), transparent 26%),
    radial-gradient(circle at 84% 18%, rgba(110,162,255,.14), transparent 24%),
    linear-gradient(130deg, rgba(255,255,255,.10), transparent 28%, transparent 72%, rgba(255,255,255,.06));
  pointer-events:none;
}
.hero::after{
  content:"FS";
  position:absolute;
  right:-10px;
  top:10px;
  font-size:140px;
  line-height:.8;
  font-weight:900;
  letter-spacing:-.08em;
  color:rgba(255,255,255,.05);
  pointer-events:none;
}
.logo-3d{
  width:112px;height:112px;
  margin:0 auto 14px;
  border-radius:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#fff;
  background:
    linear-gradient(145deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.16);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    0 18px 36px rgba(0,0,0,.26);
  position:relative;
  transform-style:preserve-3d;
  animation:logoEnter 1.05s cubic-bezier(.2,.8,.2,1), floatLogo 6s ease-in-out infinite 1.05s;
  overflow:hidden;
}
.logo-3d::before{
  content:"";
  position:absolute;
  inset:-16px;
  border-radius:40px;
  background:radial-gradient(circle, rgba(124,101,255,.30), transparent 65%);
  filter:blur(18px);
  z-index:-1;
}
.logo-3d span{
  font-size:54px;
  font-weight:900;
  letter-spacing:-.08em;
  text-shadow:0 10px 24px rgba(0,0,0,.28);
  transform:translateZ(16px);
}

.logo-img-wrap{
  overflow:hidden !important;
}
.logo-img{
  width:82%;
  height:82%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 10px 18px rgba(0,0,0,.22));
}
@keyframes logoEnter{
  0%{opacity:0;transform:scale(.72) rotateX(18deg);filter:blur(10px)}
  100%{opacity:1;transform:scale(1) rotateX(0);filter:blur(0)}
}
@keyframes floatLogo{
  50%{transform:translateY(-5px) rotateX(4deg) rotateY(-4deg)}
}
.title{
  font-size:42px;
  line-height:.94;
  font-weight:900;
  letter-spacing:-.065em;
  text-align:center;
  margin:0;
  text-wrap:balance;
}
.title .accent{
  background:linear-gradient(135deg,#fff 0%,#dbe8ff 55%,#a6c2ff 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.choices{
  display:grid;
  gap:14px;
}
.choice{
  position:relative;
  overflow:hidden;
  display:block;
  text-decoration:none;
  color:#fff;
  border-radius:30px;
  min-height:126px;
  padding:18px;
  border:1px solid rgba(255,255,255,.16);
  box-shadow:var(--shadow-soft);
  background:
    radial-gradient(circle at right top, rgba(255,255,255,.10), transparent 28%),
    linear-gradient(135deg, rgba(16,34,92,.96), rgba(57,89,204,.90));
  transform-style:preserve-3d;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
  opacity:0;
  transform:translateY(24px);
  animation:cardIn .72s cubic-bezier(.2,.8,.2,1) forwards;
}
.choice.desktop{
  background:
    radial-gradient(circle at right top, rgba(255,255,255,.10), transparent 28%),
    linear-gradient(135deg, rgba(21,31,82,.96), rgba(106,78,206,.88));
  animation-delay:.16s;
}
.choice.mobile{animation-delay:.06s;}
@keyframes cardIn{
  to{opacity:1;transform:translateY(0)}
}
.choice::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(115deg, transparent 0 36%, rgba(255,255,255,.18) 50%, transparent 64% 100%);
  transform:translateX(-130%);
  transition:transform .8s ease;
}
.choice:hover{transform:translateY(-4px) scale(1.01)}
.choice:hover::before{transform:translateX(130%)}
.choice:active{transform:scale(.985)}

.choice-grid{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:72px 1fr auto;
  gap:14px;
  align-items:center;
}
.choice-icon{
  width:72px;height:72px;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  background:linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.14),
    0 14px 24px rgba(0,0,0,.20);
  backdrop-filter:blur(12px);
}
.choice-copy h3{
  margin:0;
  font-size:30px;
  line-height:.98;
  letter-spacing:-.05em;
  font-weight:900;
}
.choice-arrow{
  width:48px;height:48px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.16);
  backdrop-filter:blur(10px);
  box-shadow:0 12px 24px rgba(0,0,0,.16);
}
.choice-bgword{
  position:absolute;
  right:12px;
  bottom:4px;
  font-size:54px;
  font-weight:900;
  letter-spacing:-.06em;
  color:rgba(255,255,255,.08);
  pointer-events:none;
}
.footer{
  text-align:center;
  margin-top:16px;
  font-size:12px;
  color:rgba(255,255,255,.56);
}

/* ripple */
.ripple{
  position:absolute;
  border-radius:999px;
  transform:scale(0);
  animation:ripple .55s linear;
  background:rgba(255,255,255,.22);
  pointer-events:none;
}
@keyframes ripple{
  to{transform:scale(12);opacity:0}
}

@media (max-width:420px){
  .wrap{padding:16px}
  .hero{border-radius:30px;padding:26px 18px 20px}
  .logo-3d{width:96px;height:96px;border-radius:28px}
  .logo-3d span{font-size:48px}
  .title{font-size:36px}
  .choice{border-radius:26px;min-height:112px;padding:16px}
  .choice-grid{grid-template-columns:62px 1fr auto;gap:12px}
  .choice-icon{width:62px;height:62px;border-radius:20px;font-size:26px}
  .choice-copy h3{font-size:26px}
  .choice-arrow{width:42px;height:42px;font-size:24px}
  .choice-bgword{font-size:46px}
}
</style>
</head>
<body>
<div class="orb"></div>
<div class="particles">
  <span></span><span></span><span></span><span></span><span></span><span></span>
</div>

<main class="wrap">
  <section class="hero">
    <a href="index-mobile.html" class="logo-3d logo-img-wrap" aria-label="Abrir Mobile">
      <img class="logo-img" src="file_00000000c73c71f58c92d4b660989472.png" alt="FS Simula+"
           onerror="this.onerror=null;this.src='LOGO ATUAL.png';">
    </a>
    <h1 class="title"><span class="accent">Escolha</span> sua plataforma</h1>
  </section>

  <section class="choices">
    <a class="choice mobile" href="index-mobile.html">
      <div class="choice-grid">
        <div class="choice-icon">📱</div>
        <div class="choice-copy">
          <h3>Mobile</h3>
        </div>
        <div class="choice-arrow">›</div>
      </div>
      <div class="choice-bgword">Mobile</div>
    </a>

    <a class="choice desktop" href="index-desktop.html">
      <div class="choice-grid">
        <div class="choice-icon">🖥️</div>
        <div class="choice-copy">
          <h3>Desktop</h3>
        </div>
        <div class="choice-arrow">›</div>
      </div>
      <div class="choice-bgword">Desktop</div>
    </a>
  </section>

  <div class="footer">FS Soluções • escolha o ambiente que deseja abrir</div>
</main>

<script>
document.querySelectorAll('.choice, .logo-3d').forEach(el=>{
  el.addEventListener('click', function(e){
    const rect = el.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
    el.appendChild(ripple);
    setTimeout(()=>ripple.remove(), 600);
  });
});
</script>
</body>
</html>
